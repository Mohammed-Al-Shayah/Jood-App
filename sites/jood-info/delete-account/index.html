<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JOOD Food Offers – Account Deletion</title>
  <meta name="description" content="How to delete your JOOD Food Offers account." />
  <meta name="theme-color" content="#2F7D5C" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green-600: #2F7D5C;
      --green-100: #E8F3EE;
      --gray-900: #1A1F1C;
      --gray-700: #3D4540;
      --gray-500: #6C756F;
      --gray-200: #E6EBE7;
      --gray-100: #F6F8F7;
      --white: #FFFFFF;
      --shadow: 0 10px 30px rgba(26, 31, 28, 0.08);
      --radius-md: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--gray-900);
      background: linear-gradient(180deg, #FAFCFB 0%, #F4F8F6 100%);
    }
    body.ar { font-family: "Cairo", "Plus Jakarta Sans", sans-serif; }
    a { color: inherit; text-decoration: none; }
    .container { width: min(980px, 92%); margin: 0 auto; }
    header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(250, 252, 251, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--gray-200);
    }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; gap: 16px; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; }
    .brand-badge { width: 36px; height: 36px; border-radius: 10px; background: var(--green-100); display: grid; place-items: center; color: var(--green-600); font-weight: 700; }
    .nav-links { display: flex; gap: 18px; font-weight: 600; color: var(--gray-700); }
    .lang-switch { display: inline-flex; gap: 6px; background: var(--gray-100); border: 1px solid var(--gray-200); padding: 4px; border-radius: 999px; }
    .lang-switch button { border: none; padding: 6px 12px; border-radius: 999px; background: transparent; cursor: pointer; font-weight: 600; color: var(--gray-700); }
    .lang-switch button.active { background: var(--green-600); color: var(--white); }

    main { padding: 32px 0 40px; }
    .page-card { background: var(--white); border-radius: var(--radius-md); padding: 22px; box-shadow: var(--shadow); border: 1px solid var(--gray-200); }
    h1 { margin-top: 0; font-size: clamp(24px, 4vw, 34px); }
    p, li { color: var(--gray-700); line-height: 1.7; }
    .steps {
      background: var(--gray-100);
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
      color: var(--gray-700);
    }
    .note {
      color: #8B2F2F;
      font-weight: 600;
      background: #FDECEC;
      border: 1px solid #F7CACA;
      padding: 10px;
      border-radius: 12px;
      margin-top: 10px;
    }
    .btn {
      display: inline-flex;
      margin-top: 12px;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--green-600);
      color: var(--white);
      font-weight: 600;
    }

    footer { padding: 18px 0 40px; color: var(--gray-500); }
    .footer-links { display: flex; gap: 12px; flex-wrap: wrap; }

    body.ar .nav, body.ar .page-card { direction: rtl; }

    @media (max-width: 720px) { .nav { flex-direction: column; align-items: stretch; } }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <div class="brand">
        <div class="brand-badge">J</div>
        <span data-i18n="brand">JOOD Support</span>
      </div>
      <nav class="nav-links">
        <a href="/support" data-i18n="nav_support">Support</a>
        <a href="/privacy" data-i18n="nav_privacy">Privacy</a>
        <a href="/terms" data-i18n="nav_terms">Terms</a>
      </nav>
      <div class="lang-switch" role="group" aria-label="Language switch">
        <button type="button" data-lang="en" class="active">EN</button>
        <button type="button" data-lang="ar">AR</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-card">
        <h1 data-i18n="title">Account Deletion</h1>
        <p data-i18n="intro">To permanently delete your account and associated data:</p>
        <div class="steps" data-i18n="steps">Open the app → Settings → Account → Delete Account.</div>
        <div class="note" data-i18n="note">Deletion is permanent and cannot be undone.</div>
        <a class="btn" href="mailto:support@joodapp.io" data-i18n="contact_btn">Contact Support</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="/support" data-i18n="nav_support">Support</a>
        <a href="/privacy" data-i18n="nav_privacy">Privacy</a>
      </div>
    </div>
  </footer>

  <script>
    const translations = {
      en: {
        brand: "JOOD Support",
        nav_support: "Support",
        nav_privacy: "Privacy",
        nav_terms: "Terms",
        title: "Account Deletion",
        intro: "To permanently delete your account and associated data:",
        steps: "Open the app → Settings → Account → Delete Account.",
        note: "Deletion is permanent and cannot be undone.",
        contact_btn: "Contact Support"
      },
      ar: {
        brand: "دعم جود",
        nav_support: "الدعم",
        nav_privacy: "سياسة الخصوصية",
        nav_terms: "شروط الاستخدام",
        title: "حذف الحساب",
        intro: "لحذف حسابك والبيانات المرتبطة به نهائيًا:",
        steps: "افتح التطبيق → الإعدادات → الحساب → حذف الحساب.",
        note: "الحذف نهائي ولا يمكن التراجع عنه.",
        contact_btn: "تواصل مع الدعم"
      }
    };

    function setLanguage(lang) {
      const dict = translations[lang] || translations.en;
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
      document.body.classList.toggle("ar", lang === "ar");
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (dict[key]) el.textContent = dict[key];
      });
      document.querySelectorAll(".lang-switch button").forEach(btn => {
        btn.classList.toggle("active", btn.getAttribute("data-lang") === lang);
      });
      localStorage.setItem("lang", lang);
    }

    document.querySelectorAll(".lang-switch button").forEach(btn => {
      btn.addEventListener("click", () => setLanguage(btn.getAttribute("data-lang")));
    });

    setLanguage(localStorage.getItem("lang") || "en");
  </script>
</body>
</html>
